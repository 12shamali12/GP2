version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: messi_grad
    restart: always
    environment:
      POSTGRES_USER: shamali
      POSTGRES_PASSWORD: 5658040
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
